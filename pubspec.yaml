name: daggerheart_companion
description: "A Flutter companion app for the Daggerheart TTRPG — manage characters, track HP/Stress/Hope, and follow all official rules."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management (manual providers — no code-gen conflicts)
  flutter_riverpod: ^2.6.1

  # Local storage
  shared_preferences: ^2.3.5

  # Navigation
  go_router: ^14.6.3

  # UI & fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
